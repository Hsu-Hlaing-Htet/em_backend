name: Docker

on:
  push:
    branches: [testing]
    paths-ignore:
      - '.github/**'
  pull_request:
    branches: [testing]
    paths-ignore:
      - '.github/**'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:testing
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  migrate:
    if: github.ref == 'refs/heads/testing' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Set image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: docker pull "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"

      - name: Run migrations
        env:
          APP_KEY: ${{ secrets.APP_KEY }}
          DB_URL: ${{ vars.DB_URL }}
        run: |
          if [ -z "$DB_URL" ]; then
            echo "DB_URL is not set. Add it under Settings → Secrets and variables → Actions → Variables."
            exit 1
          fi
          if [ -z "$APP_KEY" ]; then
            echo "APP_KEY secret is required for migrations. Add it under Settings → Secrets and variables → Actions → Secrets."
            exit 1
          fi
          docker run --rm \
            -e APP_KEY="$APP_KEY" \
            -e APP_ENV=production \
            -e DB_CONNECTION=pgsql \
            -e DB_URL="$DB_URL" \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" \
            php artisan migrate --force --no-ansi
