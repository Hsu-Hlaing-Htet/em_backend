services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    environment:
      PORT: ${PORT:-8000}
      APP_NAME: ${APP_NAME:-EM Backend}
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY:?Set APP_KEY in .env}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost:8000}
      LOG_CHANNEL: ${LOG_CHANNEL:-stderr}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DB_CONNECTION: ${DB_CONNECTION:-pgsql}
      DB_HOST: ${DB_HOST:?Set DB_HOST to your external database host}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:?Set DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME:?Set DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD}
      DB_SSLMODE: ${DB_SSLMODE:-require}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-false}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    env_file:
      - path: .env
        required: false
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:$${PORT:-8000}/up || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
